<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>적성검사 안내</title>

<style>
body{
font-family:sans-serif;
background:#f5f5f5;
text-align:center;
padding:20px;
}

button{
width:90%;
max-width:400px;
padding:18px;
margin:10px;
font-size:20px;
border:none;
border-radius:10px;
background:#2d7df6;
color:white;
}

.box{
background:white;
padding:20px;
margin-top:20px;
border-radius:10px;
font-size:18px;
}
</style>
</head>

<body>

<h1>🚗 적성검사 안내</h1>

<p>연령대를 선택해주세요</p>

<button onclick="age('normal')">70세 미만</button>
<button onclick="age('70')">70세 이상</button>
<button onclick="age('75')">75세 이상</button>

<div id="result" class="box">
필요한 준비물을 안내합니다.
</div>

<script>

function age(type){

let text=""

if(type=="normal"){
text=`
준비물

- 기존 운전면허증
- 6개월 이내 사진 1장

시력검사 필요

사진 규격  
3.5 × 4.5  
흰색 배경

📍 1층 B동 신체검사실 옆  
즉석사진 촬영 가능
`
}

if(type=="70"){
text=`
70세 이상 적성검사

준비물

- 기존 운전면허증
- 6개월 이내 사진

시력검사 필요
`
}

if(type=="75"){
text=`
75세 이상 적성검사

준비물

- 기존 운전면허증
- 6개월 이내 사진

📌 고령자 교통안전교육 필요
`
}

document.getElementById("result").innerText=text

}

</script>

</body>
</html>
