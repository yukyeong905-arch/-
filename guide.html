<!DOCTYPE html>
<html lang="ko">

<head>
<meta charset="UTF-8">
<title>운전면허 민원 안내</title>

<style>

body{
font-family:sans-serif;
background:#f5f5f5;
text-align:center;
padding:20px;
}

h1{
font-size:30px;
margin-bottom:20px;
}

h2{
margin-top:40px;
}

button{
width:95%;
max-width:450px;
padding:24px;
margin:10px;
font-size:24px;
border:none;
border-radius:12px;
background:#2d7df6;
color:white;
}

.voice{
background:#2fa84f;
}

.result{
margin-top:20px;
padding:20px;
background:white;
border-radius:10px;
font-size:20px;
}

</style>

</head>

<body>

<h1>🚗 운전면허 민원 안내</h1>

<h2>민원 선택</h2>

<button onclick="location.href='aptitude.html'">
적성검사 / 갱신
</button>

<button onclick="location.href='reissue.html'">
면허증 재발급
</button>

<button onclick="location.href='name.html'">
이름 변경
</button>

<button class="voice" onclick="startVoice()">
🎤 음성 질문
</button>

<div class="result" id="result">
버튼을 누르거나 음성으로 질문해주세요
</div>

<hr style="margin:40px 0">

<h2>🌏 Foreign Driver Service</h2>

<button>English</button>

<button>中文</button>

<button>Tiếng Việt</button>


<script>

function speak(text){

const msg = new SpeechSynthesisUtterance(text)

msg.lang="ko-KR"

speechSynthesis.speak(msg)

}


function startVoice(){

const recognition = new webkitSpeechRecognition()

recognition.lang="ko-KR"

recognition.start()

document.getElementById("result").innerText="듣고 있습니다..."

recognition.onresult=function(event){

let text = event.results[0][0].transcript

document.getElementById("result").innerText="인식된 질문 : " + text

if(text.includes("재발급")){

speak("면허 재발급 안내로 이동합니다")

setTimeout(function(){

location.href="재발급.html"

},2000)

}

else if(text.includes("적성") || text.includes("갱신")){

speak("적성검사 안내로 이동합니다")

setTimeout(function(){

location.href="적성검사.html"

},2000)

}

else if(text.includes("이름") || text.includes("개명")){

speak("이름 변경 안내로 이동합니다")

setTimeout(function(){

location.href="이름.html"

},2000)

}

else{

speak("재발급 적성검사 이름변경 중 말씀해주세요")

document.getElementById("result").innerText="재발급 / 적성검사 / 이름변경 중 말씀해주세요"

}

}

}

</script>

</body>

</html>
